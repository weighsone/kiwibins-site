name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual deploys from the Actions tab
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; skip queued runs but don't cancel in-progress
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # Web3Forms public access key (client-side key, safe to store here)
          PUBLIC_WEB3FORMS_KEY: "cec07fcf-9e51-44a5-ad3f-be0a01f05fa3"
          # Replace the placeholder below with your real GA4 ID when ready (e.g. G-ABC123XYZ)
          # Or override via a GitHub repository secret named PUBLIC_GA_MEASUREMENT_ID
          PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA_MEASUREMENT_ID || 'G-XXXXXXXXXX' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
